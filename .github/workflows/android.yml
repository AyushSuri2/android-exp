name: Android Cloud Emulator Only

on:
  workflow_dispatch:

jobs:
  emulator:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            qemu-kvm \
            xfce4 \
            xfce4-goodies \
            xvfb \
            x11vnc \
            novnc \
            websockify \
            mesa-utils \
            adb \
            wget \
            curl \
            unzip \
            python3

          sudo groupadd -r kvm 2>/dev/null || true
          sudo gpasswd -a $USER kvm

          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules

          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

          ls -l /dev/kvm

          echo "Checking nohup..."
          which nohup
          nohup --version || true

      - name: Install Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools

          cd $HOME/android-sdk/cmdline-tools

          wget -q https://dl.google.com/android/repository/commandlinetools-linux-13114758_latest.zip

          unzip -q commandlinetools-linux-13114758_latest.zip

          mv cmdline-tools latest

          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV

          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
          echo "$HOME/android-sdk/emulator" >> $GITHUB_PATH

      - name: Install emulator packages
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true

          sdkmanager \
            "platform-tools" \
            "emulator" \
            "platforms;android-35" \
            "system-images;android-35;google_apis;x86_64"

      - name: Create AVD
        run: |
          mkdir -p ~/.android/avd

          echo "no" | avdmanager create avd \
            -n Pixel35 \
            -k "system-images;android-35;google_apis;x86_64" \
            -d 9 \
            --force

      - name: Install cloudflared
        run: |
          cd /tmp

          wget -q \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb

          sudo dpkg -i cloudflared-linux-amd64.deb || \
            sudo apt-get install -f -y

      - name: Write receiver script
        run: |
          cat > /tmp/receiver.py <<'PYEOF'
          from http.server import BaseHTTPRequestHandler, HTTPServer
          import subprocess
          import urllib.parse
          import os

          PORT = 9000

          class Handler(BaseHTTPRequestHandler):

              def do_POST(self):
                  length = int(self.headers.get('Content-Length', 0))
                  data = self.rfile.read(length)

                  if self.path == '/upload':
                      apk = '/tmp/uploaded.apk'

                      with open(apk, 'wb') as f:
                          f.write(data)

                      self.send_response(200)
                      self.end_headers()

                      self.wfile.write(b'APK received. Installing...\n')

                      r = subprocess.run(
                          ['adb', 'install', '-r', '-d', apk],
                          capture_output=True,
                          text=True
                      )

                      self.wfile.write(
                          r.stdout.encode() + r.stderr.encode()
                      )

                  elif self.path == '/metro':
                      body = data.decode()

                      params = urllib.parse.parse_qs(body)

                      url = params.get('url', [''])[0]

                      self.send_response(200)
                      self.end_headers()

                      self.wfile.write(f'URL: {url}\n'.encode())

                      if url:
                          exp_url = url.replace('https://', 'exp+')

                          r = subprocess.run([
                              'adb',
                              'shell',
                              'am',
                              'start',
                              '-a',
                              'android.intent.action.VIEW',
                              '-d',
                              exp_url,
                              'host.exp.exponent'
                          ], capture_output=True, text=True)

                          self.wfile.write(
                              r.stdout.encode() + r.stderr.encode()
                          )

                  elif self.path == '/cmd':
                      body = data.decode()

                      params = urllib.parse.parse_qs(body)

                      cmd = params.get('cmd', [''])[0]

                      self.send_response(200)
                      self.end_headers()

                      if cmd:
                          args = ['adb'] + cmd.split()

                          r = subprocess.run(
                              args,
                              capture_output=True,
                              text=True,
                              timeout=30
                          )

                          self.wfile.write(
                              r.stdout.encode() + r.stderr.encode()
                          )

                      else:
                          self.wfile.write(
                              b'Usage: cmd=shell+pm+list+packages\n'
                          )

                  elif self.path == '/config':
                      body = data.decode()

                      params = urllib.parse.parse_qs(body)

                      url = params.get('logurl', [''])[0]

                      self.send_response(200)
                      self.end_headers()

                      with open('/tmp/logpush_url.txt', 'w') as f:
                          f.write(url)

                      self.wfile.write(
                          f'Log push URL set to: {url}\n'.encode()
                      )

                  else:
                      self.send_error(404)

              def do_GET(self):

                  if self.path == '/health':
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'ok')

                  elif self.path.startswith('/logs'):

                      parsed = urllib.parse.urlparse(self.path)

                      qs = urllib.parse.parse_qs(parsed.query)

                      n = int(qs.get('n', ['100'])[0])

                      self.send_response(200)
                      self.end_headers()

                      if os.path.exists('/tmp/android.log'):

                          r = subprocess.run(
                              ['tail', '-n', str(n), '/tmp/android.log'],
                              capture_output=True,
                              text=True
                          )

                          self.wfile.write(r.stdout.encode())

                      else:
                          self.wfile.write(b'No logs yet.\n')

                  else:
                      self.send_error(404)

              def log_message(self, format, *args):
                  pass

          HTTPServer(('', PORT), Handler).serve_forever()
          PYEOF

      - name: Start desktop, emulator, receiver and tunnels
        run: |
          export DISPLAY=:1

          # -------------------------
          # Desktop
          # -------------------------

          Xvfb :1 -screen 0 1280x720x24 \
            > /tmp/xvfb.log 2>&1 &

          sleep 2

          startxfce4 \
            > /tmp/xfce.log 2>&1 &

          sleep 5

          x11vnc \
            -display :1 \
            -forever \
            -nopw \
            -shared \
            > /tmp/x11vnc.log 2>&1 &

          websockify \
            --web=/usr/share/novnc/ \
            6080 \
            localhost:5900 \
            > /tmp/websockify.log 2>&1 &

          sleep 2

          echo "[OK] Desktop + noVNC running"

          # -------------------------
          # Android Emulator
          # -------------------------

          export ANDROID_AVD_HOME=$HOME/.android/avd

          nohup emulator @Pixel35 \
            -gpu swiftshader_indirect \
            -noaudio \
            -no-boot-anim \
            -no-snapshot \
            -memory 2048 \
            -cores 2 \
            > /tmp/emulator.log 2>&1 &

          echo "[OK] Emulator launched, waiting for cold boot..."

          adb wait-for-device

          boot_completed=""

          until [[ "$boot_completed" == "1" ]]; do
            sleep 5
            boot_completed=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
            echo "Waiting for Android boot..."
          done

          echo "[OK] Android fully booted"

          adb devices

          ps aux | grep "[e]mulator" || \
            echo "WARNING: emulator process not found"

          # -------------------------
          # Receiver
          # -------------------------

          nohup python3 /tmp/receiver.py \
            > /tmp/receiver.log 2>&1 &

          sleep 2

          RC_STATUS=$(curl -s -o /dev/null \
            -w "%{http_code}" \
            http://localhost:9000/health)

          echo "[OK] receiver HTTP $RC_STATUS"

          # -------------------------
          # Cloudflare noVNC tunnel
          # -------------------------

          nohup cloudflared tunnel \
            --url http://localhost:6080 \
            > /tmp/tunnel_vnc.log 2>&1 &

          sleep 15

          VNC_URL=$(grep -oE \
            'https://[a-zA-Z0-9-]+\.trycloudflare\.com' \
            /tmp/tunnel_vnc.log | head -n1)

          echo ""
          echo "================================="
          echo "=== noVNC URL =================="
          echo "================================="
          echo "$VNC_URL"

          # -------------------------
          # Cloudflare API tunnel
          # -------------------------

          nohup cloudflared tunnel \
            --url http://localhost:9000 \
            > /tmp/tunnel_apk.log 2>&1 &

          sleep 15

          APK_URL=$(grep -oE \
            'https://[a-zA-Z0-9-]+\.trycloudflare\.com' \
            /tmp/tunnel_apk.log | head -n1)

          echo ""
          echo "================================="
          echo "=== APK / CMD / METRO URL ======"
          echo "================================="
          echo "$APK_URL"

          echo ""
          echo "=== ALL SERVICES STARTED ==="
          echo "GitHub Actions hard limit: ~6h"

          trap 'echo "SIGTERM received, exiting gracefully"; exit 0' SIGTERM

          while true; do
            sleep 60
          done
